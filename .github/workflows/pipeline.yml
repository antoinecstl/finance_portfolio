name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: "https://ci.local"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
      PADDLE_API_KEY: "ci-paddle-api-key"
      PADDLE_WEBHOOK_SECRET: "ci-paddle-webhook-secret"
      PADDLE_PRO_PRICE_ID: "pri_ci_monthly"
      PADDLE_PRO_YEARLY_PRICE_ID: "pri_ci_yearly"
      NEXT_PUBLIC_PADDLE_ENV: "sandbox"
      NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: "ci-paddle-client-token"
      NEXT_PUBLIC_PADDLE_PRO_PRICE_ID: "pri_ci_monthly"
      NEXT_PUBLIC_PADDLE_PRO_YEARLY_PRICE_ID: "pri_ci_yearly"
      RESEND_API_KEY: "re_ci_key"
      RESEND_FROM: "Fi-Hub <noreply@example.com>"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
